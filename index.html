<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastosYa — Iniciar Sesión / Registro</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 31, 48, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo-section p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(11, 15, 25, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(11, 15, 25, 0.95);
        }

        .form-control:focus + i {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px var(--primary-glow);
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        /* Message Display */
        .message-box {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .message-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            display: flex;
        }

        .message-box.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            display: flex;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="logo-section">
            <h1><i data-lucide="wallet"></i> GastosYa</h1>
            <p id="auth-subtitle">Gestión de gastos simple y eficiente</p>
        </div>

        <!-- Feedback Alert Box -->
        <div class="message-box" id="message-box"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="login-email" class="form-control" placeholder="nombre@correo.com" required>
                    <i data-lucide="mail"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                    <i data-lucide="lock"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btn-login">
                <i data-lucide="log-in"></i> Iniciar Sesión
            </button>

            <p class="toggle-text">
                ¿No tienes cuenta? <a onclick="toggleAuth(false)">Regístrate aquí</a>
            </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" style="display: none;">
            <div class="form-group">
                <label for="reg-nombre">Nombre Completo</label>
                <div class="input-wrapper">
                    <input type="text" id="reg-nombre" class="form-control" placeholder="Juan Pérez" required>
                    <i data-lucide="user"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="reg-email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="reg-email" class="form-control" placeholder="nombre@correo.com" required>
                    <i data-lucide="mail"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="reg-password">Contraseña (Mín. 6 caracteres)</label>
                <div class="input-wrapper">
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" minlength="6" required>
                    <i data-lucide="lock"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btn-register">
                <i data-lucide="user-plus"></i> Crear Cuenta
            </button>

            <p class="toggle-text">
                ¿Ya tienes una cuenta? <a onclick="toggleAuth(true)">Inicia sesión aquí</a>
            </p>
        </form>

    </div>

    <script>
        const API_BASE = '';
        
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const subtitle = document.getElementById('auth-subtitle');
        const messageBox = document.getElementById('message-box');

        document.addEventListener('DOMContentLoaded', () => {
            // Check if token exists, verify and redirect
            const token = localStorage.getItem('token');
            if (token) {
                checkAuthAndRedirect(token);
            }
            lucide.createIcons();
        });

        function showMessage(text, type = 'success') {
            messageBox.textContent = text;
            messageBox.className = `message-box ${type}`;
            setTimeout(() => {
                messageBox.className = 'message-box';
                messageBox.style.display = 'none';
            }, 5000);
        }

        function toggleAuth(showLogin) {
            if (showLogin) {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                subtitle.textContent = 'Gestión de gastos simple y eficiente';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                subtitle.textContent = 'Crea tu cuenta de gastos personales';
            }
            messageBox.style.display = 'none';
        }

        // Parse JWT payload helper
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) {
                    base64 += '=';
                }
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        async function checkAuthAndRedirect(token) {
            try {
                const payload = parseJwt(token);
                if (!payload || (payload.exp && Date.now() >= payload.exp * 1000)) {
                    localStorage.removeItem('token');
                    return;
                }
                
                // Redirect based on role
                if (payload.rol === 'admin') {
                    window.location.href = '/admin-panel';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (err) {
                localStorage.removeItem('token');
            }
        }

        // Login Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Error al iniciar sesión.');
                }

                localStorage.setItem('token', data.token);
                checkAuthAndRedirect(data.token);
            } catch (err) {
                showMessage(err.message, 'error');
            }
        });

        // Register Submit
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('reg-nombre').value.trim();
            const correo = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, correo, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Error al registrarse.');
                }

                showMessage('Cuenta creada con éxito. Iniciando sesión...', 'success');
                
                // Automatically log in
                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });
                
                const loginData = await loginResponse.json();
                if (loginResponse.ok) {
                    localStorage.setItem('token', loginData.token);
                    setTimeout(() => checkAuthAndRedirect(loginData.token), 1000);
                } else {
                    setTimeout(() => toggleAuth(true), 1500);
                }
            } catch (err) {
                showMessage(err.message, 'error');
            }
        });
    </script>
</body>
</html>
